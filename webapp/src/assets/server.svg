<svg width="220" height="200" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gr" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gy" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- SERVER 1 -->
  <rect x="16" y="16" width="188" height="44" rx="7" fill="#4a5060"/>
  <rect x="20" y="20" width="180" height="36" rx="5" fill="#3a404e"/>
  <rect x="108" y="32" width="76" height="6" rx="3" fill="#555c6b"/>

  <circle cx="44" cy="38" r="6" fill="#c0392b" filter="url(#gr)">
    <animate attributeName="fill" dur="4.1s" repeatCount="indefinite" keyTimes="0;0.3;0.31;0.6;0.61;1" values="#c0392b;#c0392b;#e74c3c;#e74c3c;#c0392b;#c0392b"/>
    <animate attributeName="r"    dur="4.1s" repeatCount="indefinite" keyTimes="0;0.3;0.31;0.6;0.61;1" values="6;6;6.8;6.8;6;6"/>
  </circle>
  <circle cx="64" cy="38" r="6" fill="#d4ac0d" filter="url(#gy)">
    <animate attributeName="fill" dur="5.7s" repeatCount="indefinite" begin="0.8s" keyTimes="0;0.25;0.26;0.55;0.56;1" values="#d4ac0d;#d4ac0d;#f1c40f;#f1c40f;#d4ac0d;#d4ac0d"/>
    <animate attributeName="r"    dur="5.7s" repeatCount="indefinite" begin="0.8s" keyTimes="0;0.25;0.26;0.55;0.56;1" values="6;6;6.8;6.8;6;6"/>
  </circle>
  <circle cx="84" cy="38" r="6" fill="#1e8449" filter="url(#gg)">
    <animate attributeName="fill" dur="3.3s" repeatCount="indefinite" begin="1.5s" keyTimes="0;0.2;0.21;0.5;0.51;1" values="#1e8449;#1e8449;#27ae60;#27ae60;#1e8449;#1e8449"/>
    <animate attributeName="r"    dur="3.3s" repeatCount="indefinite" begin="1.5s" keyTimes="0;0.2;0.21;0.5;0.51;1" values="6;6;6.8;6.8;6;6"/>
  </circle>

